<div class="registro-container">
  <div class="registro-card">
    <h2>Crear Cuenta</h2>
    
    <form [formGroup]="registroForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" formControlName="username" placeholder="Elige un nombre de usuario">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" formControlName="password" placeholder="Crea una contraseña segura">
      </div>

      <button type="submit" [disabled]="registroForm.invalid">Registrarse</button>
      
      <p *ngIf="mensajeError" class="error-text">{{ mensajeError }}</p>
    </form>

    <div class="login-link">
      <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión aquí</a></p>
    </div>
    
  </div>
</div>
