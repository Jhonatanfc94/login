<div class="login-container">
  <div class="login-card">
    <h2>Iniciar Sesión</h2>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" formControlName="username" placeholder="Ingresa tu usuario">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" formControlName="password" placeholder="Ingresa tu contraseña">
      </div>

      <button type="submit" [disabled]="loginForm.invalid">Entrar</button>
      
      <p *ngIf="mensajeError" class="error-text">{{ mensajeError }}</p>
    </form>

    <div class="register-link">
      <p>¿No tienes cuenta? <a routerLink="/registro">Regístrate aquí</a></p>
    </div>
    
  </div>
</div>
